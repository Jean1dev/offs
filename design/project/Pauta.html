<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pauta — Assistente de Roteiros</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg); font-family: var(--font-body); color: var(--text-primary); -webkit-font-smoothing: antialiased; }
  #root { height: 100vh; }
  ::selection { background: var(--accent-light); color: var(--accent-dark); }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; border: 3px solid var(--bg); }
  *::-webkit-scrollbar-track { background: transparent; }
  input::placeholder, textarea::placeholder { color: var(--text-tertiary); }
  @keyframes pauta-spin { to { transform: rotate(360deg); } }
  @keyframes pauta-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  #root > div { animation: none; }
</style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#C45C58">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#C45C58"/>
      <g transform="translate(600 360)" fill="none" stroke="#F9E8E3" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 -150 L40 -40 L150 0 L40 40 L0 150 L-40 40 L-150 0 L-40 -40 Z" fill="#F9E8E3" stroke="none"/>
      </g>
      <text x="600" y="600" font-family="Cormorant Garamond, Georgia, serif" font-size="120" font-weight="500" fill="#F9E8E3" text-anchor="middle">Pauta</text>
    </svg>
  </template>
  <div id="root"></div>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app/screen_projects.jsx"></script>

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
